services:

  web:
    build: .
    pull_policy: build
    restart: always
    command: gunicorn chudartz.wsgi:application --bind 0.0.0.0:8003
    env_file: stack.env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    ports:
      - "8003:8003"
    depends_on:
      - db
    working_dir: /app

  db:
    image: postgres:16
    container_name: chudaratz_db
    restart: always
    env_file: stack.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5434"
    ports:
      - "5434:5434"

  backup:
    image: eeshugerman/postgres-backup-s3:16
    env_file: stack.env
    restart: always
    environment:
      SCHEDULE: '@daily'
      BACKUP_KEEP_DAYS: 7

  nginx:
    image: nginx:alpine
    restart: always
    volumes:
      - nginx_volume:/etc/nginx
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    ports:
      - "81:81"

volumes:
  postgres_data:

  media_volume:
    external: true
    name: chudartz_media_volume

  static_volume:
    external: true
    name: chudartz_static_volume
    
  nginx_volume:
    external: true
    name: chudartz_nginx_volume
